<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>easy-cv 编辑器</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="editor-page">
      <section class="editor-panel">
        <div class="toolbar">
          <h1>YAMLResume Editor</h1>
          <div>
            <button id="saveBtn">保存 YAML</button>
            <a href="/resume" target="_blank">打开预览</a>
          </div>
        </div>
        <textarea id="yamlInput">{{ yaml_text }}</textarea>
        <p id="status"></p>
      </section>
      <section class="preview-panel">
        <iframe id="previewFrame" src="/resume" title="简历预览"></iframe>
      </section>
    </main>

    <script>
      const saveBtn = document.getElementById("saveBtn");
      const yamlInput = document.getElementById("yamlInput");
      const statusText = document.getElementById("status");
      const previewFrame = document.getElementById("previewFrame");
      const AUTO_REFRESH_MS = 0;

      function refreshPreview() {
        previewFrame.src = "/resume?t=" + Date.now();
      }

      statusText.textContent = "已开启自动预览刷新（每 3 秒）";
      // setInterval(refreshPreview, AUTO_REFRESH_MS);

      saveBtn.addEventListener("click", async () => {
        statusText.textContent = "保存中...";
        try {
          const resp = await fetch("/api/resume/raw", {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ yaml_text: yamlInput.value }),
          });
          const data = await resp.json();
          if (!resp.ok) throw new Error(data.detail || "保存失败");
          statusText.textContent = "保存成功，预览已刷新（自动刷新已关闭，开启请取消注释）。";//这里是保存后可预览
          refreshPreview();
        } catch (err) {
          statusText.textContent = "保存失败：" + err.message;
        }
      });
    </script>
  </body>
</html>
